<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Production Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(to right,#4facfe,#00c6ff);
  color:white;
  text-align:center;
  padding:30px;
}

.card{
  width:520px;
  margin:auto;
  background:rgba(255,255,255,0.1);
  border-radius:15px;
  padding:20px;
  backdrop-filter:blur(10px);
}

input{
  padding:10px;
  border:none;
  border-radius:6px;
  margin:10px;
  width:160px;
}

button{
  padding:10px 16px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:white;
  font-weight:bold;
}

button:hover{opacity:0.85}

.danger{background:#ff4d4d;color:white;}

.inline{font-size:20px;margin:10px;}

.dashboard{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:40px;
  margin-top:20px;
}

#chartContainer{width:200px;}

#statusCircle{
  width:120px;
  height:120px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:14px;
  background:gray;
  padding:10px;
}

#paceText{
  margin-top:10px;
  font-size:14px;
}
</style>
</head>

<body>

<h1>Production Dashboard</h1>

<div class="card">

<!-- START -->
<div id="initial">
  <p>Enter total units for today's production:</p>
  <input type="number" id="totalInput">
  <button onclick="start()">Start</button>
</div>

<!-- MAIN -->
<div id="main" style="display:none;">

  <div class="inline">Total: <span id="totalShow">0</span></div>
  <div class="inline">Packed: <span id="packedShow">0</span></div>

  <div>
    <input id="addInput" type="number" placeholder="Add units">
    <button onclick="add()">Add</button>
  </div>

  <button class="danger" onclick="end()">End Production</button>

  <div class="dashboard">

    <div>
      <div id="statusCircle">--</div>
      <div id="paceText">--</div>
    </div>

    <div id="chartContainer">
      <canvas id="chart"></canvas>
    </div>

  </div>
</div>

<div id="summary"></div>

</div>

<script>

let total=0;
let packed=0;
let chart;

const startHour=8.5;
const endHour=21.5;

const users=["Kyle","Sofiya","Elamari","Osama"];

function nowDecimal(){
  const d=new Date();
  return d.getHours()+d.getMinutes()/60;
}

function timeProgress(){
  const n=nowDecimal();
  if(n<=startHour)return 0;
  if(n>=endHour)return 1;
  return (n-startHour)/(endHour-startHour);
}

function start(){
  total=parseFloat(document.getElementById("totalInput").value);
  if(!total)return;

  document.getElementById("initial").style.display="none";
  document.getElementById("main").style.display="block";

  document.getElementById("totalShow").innerText=total;

  chart=new Chart(document.getElementById("chart"),{
    type:"pie",
    data:{
      labels:["Done","Remaining"],
      datasets:[{
        data:[0,total],
        backgroundColor:["#00ff88","#ff4d4d"]
      }]
    },
    options:{
      plugins:{
        datalabels:{
          color:"white",
          formatter:(v,c)=>{
            const d=c.chart.data.datasets[0].data;
            const t=d[0]+d[1];
            return ((v/t)*100).toFixed(0)+"%";
          }
        }
      }
    },
    plugins:[ChartDataLabels]
  });

  update();
}

function add(){
  let v=parseFloat(document.getElementById("addInput").value);
  if(!v)return;

  packed+=v;
  document.getElementById("packedShow").innerText=packed;
  document.getElementById("addInput").value="";

  update();
}

function update(){

  let done=Math.min(packed,total);
  let left=Math.max(total-packed,0);

  chart.data.datasets[0].data=[done,left];
  chart.update();

  let prog=packed/total;
  let time=timeProgress();

  const box=document.getElementById("statusCircle");

  if(prog>=time){
    box.style.background="green";
    box.innerText="On Track";
  }else if(prog>=time-0.1){
    box.style.background="orange";
    box.innerText="Slightly Behind";
  }else{
    box.style.background="red";
    box.innerText="Behind";
  }

  updatePace();
}

function updatePace(){
  if(!packed)return;

  const start=new Date();
  start.setHours(8,30,0,0);

  const hrs=(new Date()-start)/3600000;
  if(hrs<=0)return;

  const rate=packed/hrs;
  if(rate<=0)return;

  const finish=new Date(start.getTime()+ (total/rate)*3600000);

  document.getElementById("paceText").innerText=
    "At this pace you will complete everything at " +
    String(finish.getHours()).padStart(2,"0")+":"+
    String(finish.getMinutes()).padStart(2,"0");
}

function end(){

  let pass=prompt("Enter password:");
  if(!users.includes(pass)){
    alert("Access denied");
    return;
  }

  let pushed=total-packed;
  let pct=((packed/total)*100).toFixed(1);

  document.getElementById("main").style.display="none";

  document.getElementById("summary").innerHTML=`
    <h2>Final Report</h2>
    <p>Packed: ${packed}</p>
    <p>Pushed: ${pushed}</p>
    <p>Completed: ${pct}%</p>
  `;
}

setInterval(update,60000);

</script>

</body>
</html>
