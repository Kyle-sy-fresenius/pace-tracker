<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pace Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 30px;
    }

    canvas {
      margin-bottom: 15px;
    }

    input {
      padding: 10px;
      font-size: 18px;
      width: 220px;
    }

    .box {
      margin-top: 15px;
      font-size: 22px;
    }

    #status {
      margin-top: 20px;
      font-size: 26px;
      font-weight: bold;
      padding: 12px;
      color: white;
      display: inline-block;
    }

    .red { background: #e74c3c; }
    .orange { background: #f39c12; }
    .green { background: #2ecc71; }
  </style>
</head>
<body>

<h2>Pace Tracker</h2>

<canvas id="clock" width="180" height="180"></canvas>

<br>

<input id="input" type="number" placeholder="Enter number + Enter">

<div class="box" id="total">Total: 0</div>
<div class="box" id="target">Target: 0</div>

<div id="status" class="red">Behind Pace</div>

<script>
  let sum = 0;

  const input = document.getElementById("input");
  const totalDiv = document.getElementById("total");
  const targetDiv = document.getElementById("target");
  const statusDiv = document.getElementById("status");

  input.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      const val = parseFloat(input.value);
      if (!isNaN(val)) {
        sum += val;
        input.value = "";
        update();
      }
    }
  });

  function getTarget() {
    const now = new Date();

    const start = new Date();
    start.setHours(8, 30, 0, 0);

    const end = new Date();
    end.setHours(21, 30, 0, 0);

    if (now < start) return 0;
    if (now > end) return 13000;

    const hours = (now - start) / (1000 * 60 * 60);
    return hours * 1000;
  }

  function update() {
    const target = Math.floor(getTarget());

    totalDiv.textContent = "Total: " + sum;
    targetDiv.textContent = "Target: " + target;

    let ratio = target === 0 ? 1 : sum / target;

    if (ratio >= 1) {
      statusDiv.textContent = "On Pace";
      statusDiv.className = "green";
    } else if (ratio >= 0.8) {
      statusDiv.textContent = "Close";
      statusDiv.className = "orange";
    } else {
      statusDiv.textContent = "Behind Pace";
      statusDiv.className = "red";
    }
  }

  // -------- CLOCK --------
  const canvas = document.getElementById("clock");
  const ctx = canvas.getContext("2d");
  const r = canvas.height / 2;
  ctx.translate(r, r);

  function drawClock() {
    const now = new Date();
    ctx.clearRect(-r, -r, canvas.width, canvas.height);

    // face
    ctx.beginPath();
    ctx.arc(0, 0, r - 5, 0, 2 * Math.PI);
    ctx.fillStyle = "#fff";
    ctx.fill();
    ctx.stroke();

    const hour = now.getHours() % 12;
    const min = now.getMinutes();
    const sec = now.getSeconds();

    drawHand((hour + min / 60) * Math.PI / 6, r * 0.5, 5);
    drawHand(min * Math.PI / 30, r * 0.7, 3);
    drawHand(sec * Math.PI / 30, r * 0.8, 2, "red");
  }

  function drawHand(pos, length, width, color = "#000") {
    ctx.beginPath();
    ctx.lineWidth = width;
    ctx.strokeStyle = color;
    ctx.lineCap = "round";
    ctx.moveTo(0, 0);
    ctx.rotate(pos);
    ctx.lineTo(0, -length);
    ctx.stroke();
    ctx.rotate(-pos);
  }

  setInterval(() => {
    drawClock();
    update();
  }, 1000);
</script>

</body>
</html>
