<!DOCTYPE html>
<html>
<head>
  <title>Pace Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 60px;
      background: #f5f5f5;
    }

    h1 {
      font-size: 42px;
    }

    #indicator {
      margin: 25px auto;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: red;
      border: 5px solid black;
    }

    #status {
      font-size: 24px;
      font-weight: bold;
    }

    #progress {
      font-size: 20px;
    }

    input {
      font-size: 28px;
      padding: 15px;
      width: 260px;
      text-align: center;
      margin-top: 25px;
    }
  </style>
</head>
<body>

  <h1>Total: <span id="total">0</span></h1>

  <div id="indicator"></div>

  <p id="status">Enter a number</p>
  <p id="progress">Progress: 0%</p>

  <input
    type="number"
    id="numberInput"
    placeholder="Enter number + Enter"
    autofocus
  >

  <script>
    let total = 0;

    const input = document.getElementById("numberInput");
    const totalDisplay = document.getElementById("total");
    const indicator = document.getElementById("indicator");
    const statusText = document.getElementById("status");
    const progressText = document.getElementById("progress");

    function getTargetByTime() {
      const now = new Date();

      const start = new Date();
      start.setHours(8, 30, 0, 0);

      const threePM = new Date();
      threePM.setHours(15, 0, 0, 0);

      const eightPM = new Date();
      eightPM.setHours(20, 0, 0, 0);

      if (now <= start) return 0;

      if (now <= threePM) {
        const progress = (now - start) / (threePM - start);
        return progress * 5000;
      }

      if (now <= eightPM) {
        const progress = (now - threePM) / (eightPM - threePM);
        return 5000 + progress * 5000;
      }

      return 10000; // cap after 8PM
    }

    function updateIndicator() {
      const target = getTargetByTime();

      let percent = 0;
      if (target > 0) {
        percent = (total / target) * 100;
      }

      progressText.textContent =
        "Progress: " + percent.toFixed(1) + "% of current target";

      if (total >= target) {
        indicator.style.background = "green";
        statusText.textContent = "Green - on track";
      } else if (total >= target * 0.6) {
        indicator.style.background = "orange";
        statusText.textContent = "Orange - close";
      } else {
        indicator.style.background = "red";
        statusText.textContent = "Red - behind";
      }
    }

    input.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        const number = Number(input.value);

        if (!isNaN(number) && input.value !== "") {
          total += number;
          totalDisplay.textContent = total;
          input.value = "";
          input.focus();
          updateIndicator();
        }
      }
    });

    // update every minute
    setInterval(updateIndicator, 60000);
    updateIndicator();
  </script>

</body>
</html>
